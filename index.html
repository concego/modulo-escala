<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo Escala</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #2196f3;
            --accent-hover: #1976d2;
            --card-bg: #2a2a2a;
            --border-color: #444444;
            --footer-bg: #1a1a1a;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        h1 { margin: 0; font-size: 1.8rem; }
        h2 { font-size: 1.4rem; color: var(--accent-color); margin-top: 0; }
        h3 { font-size: 1.1rem; margin-top: 16px; margin-bottom: 8px; }

        .panel {
            background-color: var(--panel-bg);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        select, button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
        }

        select:focus, button:focus {
            outline: 3px solid var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 8px;
        }

        button:active { background-color: var(--accent-hover); }

        .result-section {
            background-color: var(--panel-bg);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .note-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 12px 4px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .chords-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .chord-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .chord-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        .chord-degree {
            font-size: 0.85rem;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .chord-notes {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .btn-sm {
            padding: 8px;
            font-size: 0.9rem;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }
        
        .btn-sm:active {
            background-color: var(--accent-color);
            color: #fff;
        }

        footer {
            background-color: var(--footer-bg);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 24px;
            text-align: center;
            font-size: 0.95rem;
        }

        footer p {
            margin: 6px 0;
            color: var(--text-secondary);
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        footer a:focus, footer a:hover {
            text-decoration: underline;
            outline: 2px solid var(--accent-color);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Módulo Escala</h1>
    </header>

    <main>
        <!-- Painel de Controle -->
        <section class="panel" aria-label="Configuração da Escala">
            <div class="form-group">
                <label for="select-tonic">Selecione a Nota Fundamental (Tônica):</label>
                <select id="select-tonic">
                    <option value="C">Dó (C)</option>
                    <option value="C#">Dó Sustenido (C#)</option>
                    <option value="D">Ré (D)</option>
                    <option value="D#">Ré Sustenido (D#)</option>
                    <option value="E">Mi (E)</option>
                    <option value="F">Fá (F)</option>
                    <option value="F#">Fá Sustenido (F#)</option>
                    <option value="G">Sol (G)</option>
                    <option value="G#">Sol Sustenido (G#)</option>
                    <option value="A">Lá (A)</option>
                    <option value="A#">Lá Sustenido (A#)</option>
                    <option value="B">Si (B)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="select-type">Selecione o Tipo de Escala:</label>
                <select id="select-type">
                    <option value="maior">Maior Natural</option>
                    <option value="menor">Menor Natural</option>
                </select>
            </div>

            <button id="btn-generate">Calcular Escala e Acordes</button>
        </section>

        <!-- Seção de Resultados -->
        <section id="results" class="result-section" style="display: none;" aria-live="polite" tabindex="-1">
            <h2 id="result-title">Escala Calculada</h2>
            
            <h3>Notas da Escala</h3>
            <button id="btn-play-scale" style="margin-bottom: 12px; background-color: #333; border: 1px solid var(--border-color);">Ouvir Escala Sequencial</button>
            
            <!-- Texto acessível lido pelo leitor de tela -->
            <div id="scale-text-accessible" class="sr-only"></div>
            
            <!-- Grid Gráfico para visualização -->
            <div id="scale-grid" class="grid-container" aria-hidden="true"></div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 24px 0;">

            <h3>Campo Harmônico (Acordes)</h3>
            <div id="chords-text-accessible" class="sr-only"></div>
            <div id="chords-grid" class="chords-grid"></div>
        </section>
    </main>

    <!-- Rodapé Inclusivo com Créditos e Feedback -->
    <footer>
        <p><strong>Idealização:</strong> Anderson Carvalho & Adri Lima</p>
        <p>Dúvidas, sugestões ou feedbacks? Envie um e-mail para: <a href="mailto:euconcego@gmail.com">euconcego@gmail.com</a></p>
    </footer>

    <script>
        const CHROMATIC_SCALE = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        
        const NOTE_NAMES_PT = {
            'C': 'Dó', 'C#': 'Dó Sustenido', 'D': 'Ré', 'D#': 'Ré Sustenido', 
            'E': 'Mi', 'F': 'Fá', 'F#': 'Fá Sustenido', 'G': 'Sol', 
            'G#': 'Sol Sustenido', 'A': 'Lá', 'A#': 'Lá Sustenido', 'B': 'Si'
        };

        const NOTE_FREQS = {
            'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 
            'E': 329.63, 'F': 349.23, 'F#': 369.99, 'G': 392.00, 
            'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88
        };

        const SCALE_INTERVALS = {
            maior: [0, 2, 4, 5, 7, 9, 11],
            menor: [0, 2, 3, 5, 7, 8, 10]
        };

        const CHORD_RULES = {
            maior: [
                { degree: 'I', suffix: '', steps: [0, 2, 4] },
                { degree: 'ii', suffix: 'm', steps: [1, 3, 5] },
                { degree: 'iii', suffix: 'm', steps: [2, 4, 6] },
                { degree: 'IV', suffix: '', steps: [3, 5, 0] },
                { degree: 'V', suffix: '', steps: [4, 6, 1] },
                { degree: 'vi', suffix: 'm', steps: [5, 0, 2] },
                { degree: 'vii°', suffix: 'dim', steps: [6, 1, 3] }
            ],
            menor: [
                { degree: 'i', suffix: 'm', steps: [0, 2, 4] },
                { degree: 'ii°', suffix: 'dim', steps: [1, 3, 5] },
                { degree: 'III', suffix: '', steps: [2, 4, 6] },
                { degree: 'iv', suffix: 'm', steps: [3, 5, 0] },
                { degree: 'v', suffix: 'm', steps: [4, 6, 1] },
                { degree: 'VI', suffix: '', steps: [5, 0, 2] },
                { degree: 'VII', suffix: '', steps: [6, 1, 3] }
            ]
        };

        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTone(freq, duration, startTime = 0) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'triangle';
            osc.frequency.value = freq;

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime + startTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + startTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start(audioCtx.currentTime + startTime);
            osc.stop(audioCtx.currentTime + startTime + duration);
        }

        function playChord(freqs) {
            initAudio();
            freqs.forEach(freq => {
                playTone(freq, 1.2, 0);
            });
        }

        const btnGenerate = document.getElementById('btn-generate');
        const btnPlayScale = document.getElementById('btn-play-scale');
        const selectTonic = document.getElementById('select-tonic');
        const selectType = document.getElementById('select-type');
        const resultsSection = document.getElementById('results');
        const resultTitle = document.getElementById('result-title');
        const scaleGrid = document.getElementById('scale-grid');
        const scaleTextAcc = document.getElementById('scale-text-accessible');
        const chordsGrid = document.getElementById('chords-grid');
        const chordsTextAcc = document.getElementById('chords-text-accessible');

        let currentScaleNotes = [];

        btnGenerate.addEventListener('click', () => {
            const tonic = selectTonic.value;
            const type = selectType.value;
            const tonicIdx = CHROMATIC_SCALE.indexOf(tonic);

            currentScaleNotes = SCALE_INTERVALS[type].map(interval => {
                const idx = (tonicIdx + interval) % 12;
                return CHROMATIC_SCALE[idx];
            });

            const scaleNamePt = `${NOTE_NAMES_PT[tonic]} ${type.charAt(0).toUpperCase() + type.slice(1)}`;
            resultTitle.textContent = `Escala de ${scaleNamePt}`;

            scaleGrid.innerHTML = '';
            let scaleStringPt = `Notas da escala de ${scaleNamePt}: `;
            
            currentScaleNotes.forEach(note => {
                scaleStringPt += `${NOTE_NAMES_PT[note]}, `;
                const card = document.createElement('div');
                card.className = 'note-card';
                card.textContent = note;
                scaleGrid.appendChild(card);
            });
            scaleTextAcc.textContent = scaleStringPt;

            chordsGrid.innerHTML = '';
            let chordsStringPt = `Acordes do campo harmônico: `;

            CHORD_RULES[type].forEach(rule => {
                const chordNotes = rule.steps.map(stepIdx => currentScaleNotes[stepIdx]);
                const rootNote = chordNotes[0];
                const chordName = `${rootNote}${rule.suffix}`;
                
                chordsStringPt += `Grau ${rule.degree}: ${NOTE_NAMES_PT[rootNote]} ${rule.suffix === 'm' ? 'Menor' : rule.suffix === 'dim' ? 'Diminuto' : 'Maior'}. `;

                const cCard = document.createElement('div');
                cCard.className = 'chord-card';

                cCard.innerHTML = `
                    <div>
                        <div class="chord-name">${chordName}</div>
                        <div class="chord-degree">${rule.degree}</div>
                        <div class="chord-notes">${chordNotes.join(' - ')}</div>
                    </div>
                `;

                const playBtn = document.createElement('button');
                playBtn.className = 'btn-sm';
                playBtn.textContent = 'Ouvir Acorde';
                playBtn.setAttribute('aria-label', `Ouvir acorde de ${NOTE_NAMES_PT[rootNote]} ${rule.suffix === 'm' ? 'Menor' : rule.suffix === 'dim' ? 'Diminuto' : 'Maior'}`);
                
                playBtn.addEventListener('click', () => {
                    const rootFreqIdx = CHROMATIC_SCALE.indexOf(rootNote);
                    const freqs = chordNotes.map(n => {
                        let freq = NOTE_FREQS[n];
                        if (CHROMATIC_SCALE.indexOf(n) < rootFreqIdx) {
                            freq *= 2;
                        }
                        return freq;
                    });
                    playChord(freqs);
                });

                cCard.appendChild(playBtn);
                chordsGrid.appendChild(cCard);
            });
            chordsTextAcc.textContent = chordsStringPt;

            resultsSection.style.display = 'block';
            resultsSection.focus();
        });

        btnPlayScale.addEventListener('click', () => {
            if (currentScaleNotes.length === 0) return;
            const baseTonicIdx = CHROMATIC_SCALE.indexOf(currentScaleNotes[0]);
            
            currentScaleNotes.forEach((note, index) => {
                let freq = NOTE_FREQS[note];
                if (CHROMATIC_SCALE.indexOf(note) < baseTonicIdx && index > 0) {
                    freq *= 2;
                }
                playTone(freq, 0.35, index * 0.4);
            });
        });
    </script>
</body>
</html>
